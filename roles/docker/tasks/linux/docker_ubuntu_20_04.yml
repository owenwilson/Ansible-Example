---
- name: Update repositories cache
  ansible.builtin.apt:
    update_cache: yes

- name: remove old docker version
  ansible.builtin.include_tasks:
    file: ./uninstall_docker.yml
  when: 
    - uninstall is defined
    - uninstall == "true"

- name: Install dependencies
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - curl

- name: Create directory for Docker keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: add permission keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    mode: '0755'

- name: download docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: yes

- name: add permission docker.asc
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: 'a+r'

- name: Add Docker repository configuration from template
  ansible.builtin.template:
    src: ../templates/docker.sources.j2
    dest: /etc/apt/sources.list.d/docker.sources
    mode: '0644'

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: autoremove packages
  ansible.builtin.apt:
    autoremove: yes

- name: Install docker packages
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

- name: Update repositories cache
  ansible.builtin.apt:
    update_cache: yes

- name: create docker group
  ansible.builtin.group:
    name: docker
    state: present

- name: add user to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop:
    - vagrant
    - ubuntu
