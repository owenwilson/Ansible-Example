---
- name: Update repositories cache
  ansible.builtin.apt:
    update_cache: yes

- name: Clean old docker version
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
    pkg:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Install docker packages
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
